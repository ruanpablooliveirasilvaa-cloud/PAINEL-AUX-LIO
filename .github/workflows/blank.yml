<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Auxilio</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0f;
  color:white;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.video-bg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CENTRALIZA */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CAIXA */
.box {
  background: rgba(20,20,25,0.85);
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  width: 300px;
  backdrop-filter: blur(10px);
}

/* TEXTO */
h1 {
  margin:0;
}

p {
  color:#ccc;
}

/* IMAGEM */
.produto-img {
  width: 100%;
  border-radius: 12px;
  margin: 15px 0;
  box-shadow: 0 0 20px rgba(0,255,136,0.5);
}

/* BOTÃO */
.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg,#4f46e5,#3b82f6);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* POPUP */
#popup {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.popup-box {
  background:#141419;
  padding:25px;
  border-radius:12px;
  text-align:center;
  width:280px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <video autoplay muted loop playsinline class="video-bg">
    <source src="ff.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <div class="box">

      <h1>🔥 Painel Auxilio</h1>
      <p>Ativação via Shizuku • Sem root</p>

      <img src="https://i.pinimg.com/736x/7f/95/6c/7f956c0fd4bdf735064ec78540807c17.jpg" class="produto-img">

      <button class="btn" onclick="abrirPopup()">COMPRAR AGORA</button>

    </div>
  </div>
</div>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <h2>Finalizar compra</h2>

    <button class="btn" onclick="pagar()">PAGAR AGORA</button>

    <p style="font-size:13px;">
      Após pagar, você será redirecionado.
    </p>

    <button class="btn" onclick="fecharPopup()">Fechar</button>
  </div>
</div>

<script>
function abrirPopup() {
  document.getElementById("popup").style.display = "flex";
}

function fecharPopup() {
  document.getElementById("popup").style.display = "none";
}

function pagar() {
  window.open("https://nubank.com.br/cobrar/bzjnl3/69eaa81d-e23d-4aca-9ebc-63c23f157297", "_blank");

  setTimeout(function() {
    window.location.href = "entrega.html";
  }, 5000);
}
</script>

</body>
</html>
